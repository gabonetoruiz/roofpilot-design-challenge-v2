  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

\">\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;height:100%}\n  body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}\n  ::-webkit-scrollbar{display:none}\n  input,select,textarea{font-family:inherit}\n  @keyframes flashIn{0%{background:#FFECE3}100%{background:transparent}}\n  .act-new{animation:flashIn 1s ease}\n  @keyframes rowIn{0%{opacity:0;transform:translateY(-6px)}100%{opacity:1;transform:translateY(0)}}\n  .row-new{animation:rowIn .32s cubic-bezier(.16,1,.3,1)}\n  a{color:#FF6027}\n  a:hover{color:#E5501C}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#E3E5EA;display:flex;align-items:center;justify-content:center;padding:28px 16px;font-family:'Plus Jakarta Sans',sans-serif\">\n<div style=\"width:390px;height:844px;border-radius:48px;overflow:hidden;position:relative;background:#F2F2F7;box-shadow:0 40px 80px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.12)\">\n<div style=\"position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:37px;border-radius:24px;background:#000;z-index:50\"><\u002Fdiv>\n<div style=\"display:flex;flex-direction:column;height:100%;background:#F3F4F7;position:relative\">\n<div style=\"height:44px;flex-shrink:0\"><\u002Fdiv>\n<div style=\"flex:1;position:relative;overflow-y:auto\">\n\n  <!-- header -->\n  <div style=\"position:sticky;top:0;z-index:20;background:rgba(243,244,247,.92);backdrop-filter:blur(10px);border-bottom:1px solid #E7E8EC\">\n    <div style=\"display:flex;align-items:center;gap:10px;padding:26px 18px 16px\">\n      <button style=\"width:38px;height:38px;border-radius:50%;border:none;background:#fff;display:flex;align-items:center;justify-content:center;color:#171A1F;box-shadow:0 2px 8px rgba(23,26,31,.08);flex-shrink:0;transition:transform .12s ease\" style-active=\"transform:scale(.9)\" aria-label=\"Back\"><i class=\"hgi-stroke hgi-arrow-left-01\" style=\"font-size:20px\"><\u002Fi><\u002Fbutton>\n      <div style=\"flex:1;min-width:0\">\n        <h1 style=\"margin:0;font-size:20px;font-weight:800;line-height:1.15;color:#171A1F;letter-spacing:-.01em\">Joe House<\u002Fh1>\n        <p style=\"margin:2px 0 0;font-size:12.5px;color:#8A8F9C;font-weight:600\">Job <span style=\"color:#CC4D1F;font-weight:800\">#1002<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <button onclick=\"{{ onMenu }}\" style=\"width:38px;height:38px;border-radius:50%;border:none;background:#fff;display:flex;align-items:center;justify-content:center;color:#171A1F;box-shadow:0 2px 8px rgba(23,26,31,.08);flex-shrink:0;transition:transform .12s ease\" style-active=\"transform:scale(.9)\" aria-label=\"More options\"><i class=\"hgi-stroke hgi-more-vertical\" style=\"font-size:20px\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- stage stepper -->\n    <div style=\"padding:2px 18px 16px\">\n      <div style=\"font-size: 12px; font-weight: 800; color: #CC4D1F; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px\">{{ stageProgressLabel }}<\u002Fdiv>\n      <div style=\"display:flex;gap:6px\">\n        <sc-for list=\"{{ stages }}\" as=\"st\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ st.onClick }}\" title=\"{{ st.label }}\" style=\"flex:1;height:7px;border-radius:100px;border:none;padding:0;background:{{ st.segmentBg }};transition:background .2s ease,transform .12s ease\" style-active=\"transform:scaleY(1.6)\"><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <main style=\"padding:16px 16px 130px\">\n\n    <!-- next step -->\n    <section>\n      <div style=\"background:linear-gradient(180deg,#FFF7F2,#FFFFFF);border:1px solid #FFECE3;border-radius:24px;padding:20px;box-shadow:0 1px 2px rgba(23,26,31,.04)\">\n        <div style=\"display:flex;align-items:center;gap:6px;color:#CC4D1F;font-weight:800;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px\">\n          <i class=\"hgi-stroke hgi-flag-01\" style=\"font-size:20px\"><\u002Fi> Next step\n        <\u002Fdiv>\n        <h3 style=\"margin:0 0 6px;font-size:19px;font-weight:800;line-height:1.3;color:#171A1F\">Follow up on the estimate with Mary<\u002Fh3>\n        <p style=\"margin:0 0 16px;font-size:13.5px;color:#4B5160;line-height:1.55\">You sent the $18,450 estimate 2 days ago and haven't heard back. A quick nudge now keeps this job moving toward Sold.<\u002Fp>\n        <button onclick=\"{{ onNextStep }}\" style=\"border:none;border-radius:8px;font-weight:800;font-size:14px;padding:13px 18px;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#FF6027;color:#fff;transition:transform .12s ease,background .15s ease\" style-active=\"transform:scale(.97);background:#E5501C\">\n          <i class=\"hgi-stroke hgi-mail-01\" style=\"font-size:20px\"><\u002Fi>\n          Send follow-up email\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- financial -->\n    <section style=\"margin-top:16px\">\n      <div style=\"background:#fff;border-radius:24px;padding:20px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #E7E8EC\">\n          <h2 style=\"margin:0;font-size:15.5px;font-weight:800;color:#171A1F\">Financial summary<\u002Fh2>\n          <button onclick=\"{{ onViewAllFinancials }}\" style=\"background:none;border:none;color:#FF6027;font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:3px;padding:2px;transition:transform .12s ease\" style-active=\"transform:scale(.95)\">View all <i class=\"hgi-stroke hgi-arrow-right-01\" style=\"font-size:20px\"><\u002Fi><\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div>\n            <div style=\"font-size:26px;font-weight:800;color:#171A1F;letter-spacing:-.01em\">$18,450<\u002Fdiv>\n            <div style=\"font-size:12px;color:#8A8F9C;font-weight:600;margin-top:2px\">Estimate · Sent Jul 6<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:100px;font-size:11.5px;font-weight:800;background:#E8F0FE;color:#1E4FBE\">Awaiting response<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-top:16px\">\n          <button onclick=\"{{ onViewEstimate }}\" style=\"flex:1;border:1.5px solid #E7E8EC;background:#fff;color:#171A1F;border-radius:8px;font-weight:700;font-size:13px;padding:11px;transition:transform .12s ease,background .15s ease\" style-active=\"transform:scale(.97);background:#F3F4F7\">View estimate<\u002Fbutton>\n          <button onclick=\"{{ onCreateProposal }}\" style=\"flex:1;border:none;background:#FF6027;color:#fff;border-radius:8px;font-weight:700;font-size:13px;padding:11px;transition:transform .12s ease,background .15s ease\" style-active=\"transform:scale(.97);background:#E5501C\">Create proposal<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- contacts -->\n    <section style=\"margin-top:16px\">\n      <div style=\"background:#fff;border-radius:24px;padding:20px\">\n        <div style=\"margin-bottom:8px;padding-bottom:12px;border-bottom:1px solid #E7E8EC\">\n          <h2 style=\"margin:0;font-size:15.5px;font-weight:800;color:#171A1F\">Contacts<\u002Fh2>\n        <\u002Fdiv>\n        <sc-for list=\"{{ contacts }}\" as=\"c\" hint-placeholder-count=\"1\">\n          <div class=\"{{ c.newClass }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px 0;border-top:{{ c.rowBorder }}\">\n            <div style=\"width:42px;height:42px;border-radius:50%;background:{{ c.avatarBg }};color:{{ c.avatarFg }};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0\">{{ c.initials }}<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:6px;color:#171A1F\">\n                {{ c.name }}\n                <sc-if value=\"{{ c.primary }}\"><span style=\"font-size:9.5px;font-weight:800;color:#1E4FBE;background:#E8F0FE;padding:3px 8px;border-radius:100px\">Primary<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size:12px;color:#8A8F9C;margin-top:2px;font-weight:500\">{{ c.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:6px\">\n              <button onclick=\"{{ onQuickMessage }}\" style=\"width:34px;height:34px;border-radius:50%;border:1px solid #E7E8EC;background:#fff;display:flex;align-items:center;justify-content:center;color:#4B5160;transition:transform .12s ease\" style-active=\"transform:scale(.9)\" aria-label=\"Text\"><i class=\"hgi-stroke hgi-message-01\" style=\"font-size:20px\"><\u002Fi><\u002Fbutton>\n              <button onclick=\"{{ onQuickEmail }}\" style=\"width:34px;height:34px;border-radius:50%;border:1px solid #E7E8EC;background:#fff;display:flex;align-items:center;justify-content:center;color:#4B5160;transition:transform .12s ease\" style-active=\"transform:scale(.9)\" aria-label=\"Email\"><i class=\"hgi-stroke hgi-mail-01\" style=\"font-size:20px\"><\u002Fi><\u002Fbutton>\n              <sc-if value=\"{{ c.canDelete }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ c.onDelete }}\" style=\"width:34px;height:34px;border-radius:50%;border:1px solid #E7E8EC;background:#fff;display:flex;align-items:center;justify-content:center;color:#D6423C;transition:transform .12s ease,opacity .15s ease\" style-active=\"transform:scale(.9)\" aria-label=\"Remove contact\"><i class=\"hgi-stroke hgi-delete-02\" style=\"font-size:20px\"><\u002Fi><\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <button onclick=\"{{ onAddContact }}\" style=\  true }}\">\n                <div style=\"font-size:13.5px;font-weight:700;color:#171A1F\">{{ f.value }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ fieldsEditing }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ onSaveFields }}\" style=\"border:none;border-radius:8px;font-weight:800;font-size:14px;padding:12px;width:100%;background:#FF6027;color:#fff;margin-top:14px;transition:transform .12s ease,background .15s ease\" style-active=\"transform:scale(.97);background:#E5501C\">Save changes<\u002Fbutton>\n        <\u002Fsc-if>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid #E7E8EC\">\n          <span style=\"font-size:12.5px;color:#4B5160;font-weight:700\">Show all fields (incl. empty)<\u002Fspan>\n          <button onclick=\"{{ onToggleShowAll }}\" style=\"width:40px;height:23px;border-radius:100px;background:{{ showAllToggleBg }};position:relative;flex-shrink:0;border:none;transition:background .2s ease\">\n            <span style=\"position:absolute;width:19px;height:19px;background:#fff;border-radius:50%;top:2px;left:{{ showAllTogglePos }};transition:left .22s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 3px rgba(0,0,0,.2)\"><\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- notes -->\n    <section style=\"margin-top:16px\">\n      <div style=\"background:#fff;border-radius:24px;padding:20px\">\n        <div style=\"margin-bottom:8px;padding-bottom:12px;border-bottom:1px solid #E7E8EC\">\n          <h2 style=\"margin:0;font-size:15.5px;font-weight:800;color:#171A1F\">Notes<\u002Fh2>\n        <\u002Fdiv>\n        <sc-for list=\"{{ notesList }}\" as=\"note\" hint-placeholder-count=\"1\">\n          <div class=\"{{ note.newClass }}\" style=\"display:flex;gap:11px;padding:11px 0;border-top:{{ note.rowBorder }}\">\n            <div style=\"flex:1;min-width:0\">\n              <sc-if value=\"{{ note.editing }}\" hint-placeholder-val=\"{{ false }}\">\n                <div>\n                  <textarea value=\"{{ note.draft }}\" onchange=\"{{ note.onDraftChange }}\" style=\"width:100%;border:1.5px solid #E7E8EC;border-radius:12px;padding:10px 11px;font-size:13.5px;color:#171A1F;background:#FBFBFC;min-height:70px;resize:vertical\" style-focus=\"outline:none;border-color:#FF6027\"><\u002Ftextarea>\n                  <div style=\"display:flex;gap:8px;margin-top:8px\">\n                    <button onclick=\"{{ note.onCancel }}\" style=\"flex:1;border:1px solid #E7E8EC;background:#fff;color:#171A1F;border-radius:8px;font-weight:700;font-size:12.5px;padding:9px;transition:transform .12s ease,background .15s ease\" style-active=\"transform:scale(.96);background:#F3F4F7\">Cancel<\u002Fbutton>\n                    <button onclick=\"{{ note.onSave }}\" style=\"flex:1;border:none;background:#FF6027;color:#fff;border-radius:8px;font-weight:700;font-size:12.5px;padding:9px;transition:transform .12s ease,background .15s ease\" style-active=\"transform:scale(.96);background:#E5501C\">Save<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ note.viewing }}\" hint-placeholder-val=\"{{ true }}\">\n                <div>\n                  <div style=\"font-size:13.5px;font-weight:600;color:#171A1F;line-height:1.5\">{{ note.body }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#8A8F9C;margin-top:6px;font-weight:600\">{{ note.time }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:6px;flex-shrink:0\">\n              <button onclick=\"{{ note.onEdit }}\" style=\"width:32px;height:32px;border-radius:50%;border:1px solid #E7E8EC;background:#fff;display:flex;align-items:center;justify-content:center;color:#4B5160;transition:transform .12s ease\" style-active=\"transform:scale(.9)\" aria-label=\"Edit note\"><i class=\"hgi-stroke hgi-pencil-edit-01\" style=\"font-size:16px\"><\u002Fi><\u002Fbutton>\n              <button onclick=\"{{ note.onDelete }}\" style=\"width:32px;height:32px;border-radius:50%;border:1px solid #E7E8EC;background:#fff;display:flex;align-items:center;justify-content:center;color:#D6423C;transition:transform .12s ease\" style-active=\"transform:scale(.9)\" aria-label=\"Delete note\"><i class=\"hgi-stroke hgi-delete-02\" style=\"font-size:16px\"><\u002Fi><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ notesEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"font-size:12.5px;color:#8A8F9C;margin:8px 0 0;font-weight:500\">No notes yet — add one from the bottom bar.<\u002Fp>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- tasks -->\n    <section style=\"margin-top:16px\">\n      <div style=\"background:#fff;border-radius:24px;padding:20px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:12px;border-bottom:1px solid #E7E8EC\">\n          <h2 style=\"margin:0;font-size:15.5px;font-weight:800;color:#171A1F\">Tasks<\u002Fh2>\n          <button onclick=\"{{ onOpenTaskSheet }}\" style=\"background:none;border:none;color:#FF6027;font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:3px;padding:2px\"><i class=\"hgi-stroke hgi-plus-sign\" style=\"font-size:20px\"><\u002Fi>Add<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-for list=\"{{ tasksList }}\" as=\"t\" hint-placeholder-count=\"2\">\n          <div class=\"{{ t.newClass }}\" style=\"display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-top:{{ t.rowBorder }}\">\n            <button onclick=\"{{ t.onToggle }}\" style=\"width:22px;height:22px;border-radius:7px;border:2px solid {{ t.checkBorder }};flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:{{ t.checkBg }};color:#fff;transition:background .18s ease,border-color .18s ease,transform .15s cubic-bezier(.34,1.56,.64,1)\" style-active=\"transform:scale(.85)\">\n              <sc-if value=\"{{ t.done }}\"><i class=\"hgi-stroke hgi-tick-01\" style=\"font-size:12px\"><\u002Fi><\u002Fsc-if>\n            <\u002Fbutton>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font-size:14px;font-weight:700;color:{{ t.titleColor }};text-decoration:{{ t.strike }}\">{{ t.title }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#8A8F9C;margin-top:4px;display:flex;gap:8px;align-items:center;font-weight:600\">\n                <span style=\"display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;background:{{ t.pillBg }};color:{{ t.pillFg }};font-weight:800;font-size:10.5px\">{{ t.status }}<\u002Fspan>\n                <span>{{ t.due }}<\u002Fspan>·<span>{{ t.who }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- activity -->\n    <section style=\"margin-top:16px\">\n      <div style=\"background:#fff;border-radius:24px;padding:20px\">\n        <h2 style=\"margin:0 0 12px;padding-bottom:12px;border-bottom:1px solid #E7E8EC;font-size:15.5px;font-weight:800;color:#171A1F\">Activity<\u002Fh2>\n        <sc-for list=\"{{ activity }}\" as=\"a\" hint-placeholder-count=\"4\">\n          <div class=\"{{ a.newClass }}\" style=\"display:flex;gap:11px;padding:11px 0;border-top:{{ a.rowBorder }};border-radius:12px\">\n            <div style=\"width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:{{ a.iconBg }};color:{{ a.iconFg }}\"><i class=\"hgi-stroke hgi-{{ a.icon }}\" style=\"font-size:20px\"><\u002Fi><\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font-size:13px;font-weight:800;line-height:1.35;color:#171A1F\">{{ a.title }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#4B5160;margin-top:2px;line-height:1.4;font-weight:500\">{{ a.desc }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#8A8F9C;margin-top:4px;font-weight:600\">{{ a.time }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n\n<\u002Fdiv>\n\n  <!-- bottom nav (glass) -->\n  <div style=\"position:absolute;left:14px;right:14px;bottom:16px;background:rgba(255,255,255,.55);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,.6);border-radius:100px;display:flex;align-items:center;padding:8px;gap:2px;box-shadow:0 1.5px 1.5px rgba(255,255,255,.7) inset,0 12px 30px rgba(23,26,31,.16);z-index:30\">\n    <button onclick=\"{{ onQuickNote }}\" style=\"flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px;border-radius:8px;color:rgba(23,26,31,.78);transition:transform .12s ease\" style-active=\"transform:scale(.88)\">\n      <i class=\"hgi-stroke hgi-note-01\" style=\"font-size:24px\"><\u002Fi>\n    <\u002Fbutton>\n    <button onclick=\"{{ onQuickTask }}\" style=\"flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px;border-radius:8px;color:rgba(23,26,31,.78);transition:transform .12s ease\" style-active=\"transform:scale(.88)\">\n      <i class=\"hgi-stroke hgi-checkmark-square-02\" style=\"font-size:24px\"><\u002Fi>\n    <\u002Fbutton>\n    <button onclick=\"{{ onOpenCreate }}\" style=\"flex:none;width:56px;height:56px;border-radius:50%;background:#FF6027;color:#fff;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(255,96,39,.4);margin:0 4px;transition:transform .15s cubic-bezier(.34,1.56,.64,1)\" style-active=\"transform:scale(.9)\">\n      <i class=\"hgi-stroke hgi-plus-sign\" style=\"font-size:24px\"><\u002Fi>\n    <\u002Fbutton>\n    <button onclick=\"{{ onQuickEmail }}\" style=\"flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px;border-radius:8px;color:rgba(23,26,31,.78);transition:transform .12s ease\" style-active=\"transform:scale(.88)\">\n      <i class=\"hgi-stroke hgi-mail-01\" style=\"font-size:24px\"><\u002Fi>\n    <\u002Fbutton>\n    <button onclick=\"{{ onQuickMessage }}\" style=\"flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px;border-radius:8px;color:rgba(23,26,31,.78);transition:transform .12s ease\" style-active=\"transform:scale(.88)\">\n      <i class=\"hgi-stroke hgi-message-01\" style=\"font-size:24px\"><\u002Fi>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- overlay -->\n  <div onclick=\"{{ onCloseSheets }}\" style=\"position:absolute;inset:0;background:rgba(15,17,20,.44);z-index:40;opacity:{{ overlayOpacity }};pointer-events:{{ overlayPointerEvents }};transition:opacity .28s cubic-bezier(.16,1,.3,1)\"><\u002Fdiv>\n\n  <!-- contact sheet -->\n  <div style=\"position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:26px 26px 0 0;padding:10px 20px 30px;z-index:41;max-height:86%;overflow-y:auto;transform:{{ sheetContactTransform }};opacity:{{ sheetContactOpacity }};transition:transform .32s cubic-bezier(.16,1,.3,1),opacity .28s ease\">\n    <div style=\"width:36px;height:4px;background:#E7E8EC;border-radius:100px;margin:2px auto 16px\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:4px\">\n      <h3 style=\"margin:0;font-size:18px;font-weight:800;color:#171A1F\">Add a contact<\u002Fh3>\n      <button onclick=\"{{ onCloseSheets }}\" style=\"width:34px;height:34px;border-radius:50%;border:none;background:#F3F4F7;displ t:700\">{{ toastMsg }}<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    sheet: null,\n    toastMsg: '',\n    toastShow: false,\n    stageIdx: 1,\n    fieldsEditing: false,\n    showAllFields: false,\n    fields: [\n      { key: 'roofType', label: 'Roof type', value: 'Architectural shingles' },\n      { key: 'roofAge', label: 'Roof age', value: '18 years' },\n      { key: 'insurance', label: 'Insurance company', value: 'State Farm' },\n      { key: 'claim', label: 'Claim #', value: 'SF-88213-24' },\n      { key: 'damage', label: 'Damage type', value: 'Hail' },\n      { key: 'dateOfLoss', label: 'Date of loss', value: '04/12/2026' },\n      { key: 'policy', label: 'Policy #', value: 'HO-5523910' },\n      { key: 'gated', label: 'Gated community', value: 'No' },\n    ],\n    contacts: [\n      { id: 1, name: 'Mary Taylor', primary: true, sub: 'Homeowner · (318) 555-0142', initials: 'MT', avatarBg: '#E8F0FE', avatarFg: '#1E4FBE' },\n    ],\n    tasksList: [\n      { id: 1, title: 'Follow up on estimate with Mary', done: false, status: 'To do', due: 'Due today', who: 'Sam Wells' },\n      { id: 2, title: 'Schedule adjuster walk', done: false, status: 'To do', due: 'Due Mon, Jul 13', who: 'Sam Wells' },\n    ],\n    notes: [\n      { id: 'seed-1', body: \"Mary confirmed architectural shingles, color Weathered Wood. Waiting on adjuster approval for full replacement vs. repair.\", time: 'Yesterday, 4:30 PM', editing: false, draft: '' },\n    ],\n    activity: [\n      { id: 1, icon: 'mail-01', iconBg: '#E8F0FE', iconFg: '#1E4FBE', title: 'Email sent — Estimate follow-up', desc: 'To Mary Taylor', time: 'Today, 9:12 AM' },\n      { id: 2, icon: 'note-01', iconBg: '#F3F4F7', iconFg: '#4B5160', title: 'Note added', desc: \"Mary confirmed architectural shingles, color Weathered Wood. Waiting on adjuster approval for full replacement vs. repair.\", time: 'Yesterday, 4:30 PM' },\n      { id: 3, icon: 'tick-01', iconBg: '#E3F8EC', iconFg: '#146B3C', title: 'Task completed', desc: 'Send estimate to Mary Taylor', time: 'Jul 7, 11:05 AM' },\n      { id: 4, icon: 'flag-01', iconBg: '#FFECE3', iconFg: '#CC4D1F', title: 'Stage changed', desc: 'Lead → Estimating', time: 'Jul 3, 2:18 PM' },\n      { id: 5, icon: 'user-02', iconBg: '#EFEAFC', iconFg: '#7C5CDB', title: 'Job created', desc: 'From lead source: Referral — Robert Klein', time: 'Jul 1, 8:44 AM' },\n    ],\n    relSelected: 'Spouse',\n    cName: '', cPhone: '', cEmail: '', cPrimary: false,\n    noteBody: '',\n    taskTitle: '', taskDue: '', taskAssignee: 'Sam Wells',\n    emailSubject: 'Following up on your roof estimate',\n    emailBody: \"Hi Mary, just checking in on the $18,450 estimate we sent over. Happy to answer any questions or walk through the details on a quick call. Let me know what works!\",\n    msgBody: \"Hi Mary, it's Sam with RoofPilot Roofing — wanted to follow up on the estimate we sent. Free for a quick call today?\",\n    newActivityId: null,\n    newContactId: null,\n    newTaskId: null,\n    newNoteId: null,\n  };\n\n  toastTimer = null;\n\n  showToast(msg) {\n    clearTimeout(this.toastTimer);\n    this.setState({ toastMsg: msg, toastShow: true });\n    this.toastTimer = setTimeout(() => this.setState({ toastShow: false }), 2600);\n  }\n\n  addActivity(icon, iconBg, iconFg, title, desc) {\n    const id = Date.now();\n    this.setState(s => ({\n      activity: [{ id, icon, iconBg, iconFg, title, desc, time: 'Just now' }, ...s.activity],\n      newActivityId: id,\n    }));\n    setTimeout(() => this.setState(s => (s.newActivityId === id ? { newActivityId: null } : null)), 1000);\n  }\n\n  openSheet(name) { this.setState({ sheet: name }); }\n  closeSheets() { this.setState({ sheet: null }); }\n\n  renderVals() {\n    const s = this.state;\n    const STAGE_NAMES = ['Lead', 'Estimating', 'Sold', 'In Production', 'Accounts Receivable', 'Completed'];\n    const SHORT_NAMES = ['Lead', 'Estimate', 'Sold', 'Prod.', 'AR', 'Done'];\n    const stages = STAGE_NAMES.map((label, i) => {\n      const done = i < s.stageIdx;\n      const current = i === s.stageIdx;\n      let circleBg = '#fff', circleFg = '#8A8F9C', circleBorder = '#E7E8EC', circleRing = 'none';\n      if (done) { circleBg = '#1E9E5A'; circleFg = '#fff'; circleBorder = '#1E9E5A'; }\n      if (current) { circleBg = '#FF6027'; circleFg = '#fff'; circleBorder = '#FF6027'; circleRing = '0 0 0 4px #FFECE3'; }\n      let segmentBg = '#E7E8EC';\n      if (done) segmentBg = '#1E9E5A';\n      if (current) segmentBg = '#FF6027';\n      return {\n        label,\n        shortLabel: SHORT_NAMES[i],\n        num: i + 1,\n        done, current,\n        showNum: !done,\n        segmentBg,\n        circleBg, circleFg, circleBorder, circleRing,\n        lineBg: i <= s.stageIdx ? '#1E9E5A' : '#E7E8EC',\n        labelColor: current ? '#CC4D1F' : (done ? '#146B3C' : '#8A8F9C'),\n        labelWeight: current ? 800 : 700,\n        onClick: () => {\n          if (current) { this.showToast('You are here: ' + label); return; }\n          if (done) { this.showToast(label + ' — already completed'); return; }\n          this.showToast('Complete the current stage before moving to ' + label);\n        },\n      };\n    });\n\n    const fields = s.fields.map((f, i) => ({\n      ...f,\n      onChange: (e) => {\n        const v = e.target.value;\n        this.setState(st => ({ fields: st.fields.map((ff, ii) => (ii === i ? { ...ff, value: v } : ff)) }));\n      },\n    }));\n\n    const tasksList = s.tasksList.map(t => ({\n      ...t,\n      newClass: t.id === s.newTaskId ? 'row-new' : '',\n      rowBorder: 'none',\n      status: t.done ? 'Done' : t.status,\n      pillBg: t.done ? '#E3F8EC' : (t.status === 'In progress' ? '#FCF0DA' : '#E8F0FE'),\n      pillFg: t.done ? '#146B3C' : (t.status === 'In progress' ? '#B4740E' : '#1E4FBE'),\n      checkBg: t.done ? '#1E9E5A' : '#fff',\n      checkBorder: t.done ? '#1E9E5A' : '#E7E8EC',\n      titleColor: t.done ? '#8A8F9C' : '#171A1F',\n      strike: t.done ? 'line-through' : 'none',\n      onToggle: () => {\n        this.setState(st => ({\n          tasksList: st.tasksList.map(tt => (tt.id === t.id ? { ...tt, done: !tt.done } : tt)),\n        }));\n        if (!t.done) {\n          this.showToast('Task completed');\n          this.addActivity('tick-01', '#E3F8EC', '#146B3C', 'Task completed', t.title);\n        }\n      },\n    }));\n\n    const activity = s.activity.map((a, i) => ({ ...a, newClass: a.id === s.newActivityId ? 'act-new' : '', rowBorder: i === 0 ? 'none' : '1px solid #E7E8EC' }));\n\n    const contactsCount = s.contacts.length;\n    const contacts = s.contacts.map((c, i) => ({\n      ...c,\n      newClass: c.id === s.newContactId ? 'row-new' : '',\n      rowBorder: i === 0 ? 'none' : '1px solid #E7E8EC',\n      canDelete: contactsCount > 1,\n      onDelete: () => {\n        if (this.state.contacts.length <= 1) return;\n        const wasPrimary = c.primary;\n        this.setState(st => {\n          let remaining = st.contacts.filter(x => x.id !== c.id);\n          if (wasPrimary && remaining.length) {\n            remaining = remaining.map((r, i) => (i === 0 ? { ...r, primary: true } : { ...r, primary: false }));\n          }\n          return { contacts: remaining };\n        });\n        this.showToast(c.name + ' removed from contacts');\n        this.addActivity('delete-02', '#F3F4F7', '#4B5160', 'Contact removed', c.name);\n      },\n    }));\n\n    const notesList = s.notes.map((n, i) => ({\n      ...n,\n      newClass: n.id === s.newNoteId ? 'row-new' : '',\n      rowBorder: i === 0 ? 'none' : '1px solid #E7E8EC',\n      viewing: !n.editing,\n      draft: n.editing ? n.draft : n.body,\n      onEdit: () => this.setState(st => ({ notes: st.notes.map(nn => (nn.id === n.id ? { ...nn, editing: true, draft: nn.body } : nn)) })),\n      onCancel: () => this.setState(st => ({ notes: st.notes.map(nn => (nn.id === n.id ? { ...nn, editing: false } : nn)) })),\n      onDraftChange: (e) => {\n        const v = e.target.value;\n        this.setState(st => ({ notes: st.notes.map(nn => (nn.id === n.id ? { ...nn, draft: v } : nn)) }));\n      },\n      onSave: () => {\n        const current = this.state.notes.find(nn => nn.id === n.id);\n        const val = (current ? current.draft : '').trim();\n        if (!val) return;\n        this.setState(st => ({ notes: st.notes.map(nn => (nn.id === n.id ? { ...nn, body: val, time: 'Just now (edited)', editing: false } : nn)) }));\n        this.showToast('Note updated');\n        this.addActivity('pencil-edit-01', '#F3F4F7', '#4B5160', 'Note updated', val);\n      },\n      onDelete: () => {\n        const body = n.body;\n        this.setState(st => ({ notes: st.notes.filter(nn => nn.id !== n.id) }));\n        this.showToast('Note deleted');\n        this.addActivity('delete-02', '#F3F4F7', '#4B5160', 'Note deleted', body);\n      },\n    }));\n\n    const relOptions = ['Spouse', 'Co-owner', 'Tenant', 'Other'];\n    const relChips = relOptions.map(r => ({\n      label: r,\n      sel: s.relSelected === r,\n      bg: s.relSelected === r ? '#FF6027' : '#fff',\n      fg: s.relSelected === r ? '#fff' : '#4B5160',\n      border: s.relSelected === r ? '#FF6027' : '#E7E8EC',\n      onClick: () => this.setState({ relSelected: r }),\n    }));\n\n    const sheetT = (name) => (s.sheet === name ? 'translateY(0)' : 'translateY(100%)');\n    const sheetO = (name) => (s.sheet === name ? 1 : 0);\n\n    return {\n      stages,\n      currentStageName: STAGE_NAMES[s.stageIdx],\n      stageProgressLabel: (s.stageIdx + 1) + ' OF ' + STAGE_NAMES.length + ': ' + STAGE_NAMES[s.stageIdx].toUpperCase(),\n      fields, fieldsEditing: s.fieldsEditing, fieldsViewing: !s.fieldsEditing,\n      showAllToggleBg: s.showAllFields ? '#FF6027' : '#E7E8EC',\n      showAllTogglePos: s.showAllFields ? '19px' : '2px',\n      contacts,\n      tasksList,\n      activity,\n      notesList,\n      notesEmpty: s.notes.length === 0,\n      relChips,\n      cName: s.cName, cPhone: s.cPhone, cEmail: s.cEmail, cPrimary: s.cPrimary,\n      cSubmitDisabled: s.cName.trim().length === 0,\n      cSubmitOpacity: s.cName.trim().length === 0 ? 0.45 : 1,\n      noteBody: s.noteBody,\n      taskTitle: s.taskTitle, taskDue: s.taskDue, taskAssignee: s.taskAssignee,\n      emailSubject: s.emailSubject, emailBody: s.emailBody,\n      msgBody: s.msgBody,\n      sheetOpen: !!s.sheet,\n      overlayOpacity: s.sheet ? 1 : 0,\n      overlayPointerEvents: s.sheet ? 'auto' : 'none',\n      sheetContactTransform: sheetT('contact'),\n      sheetNoteTransform: sheetT('note'),\n      sheetTaskTransform: sheetT('task'),\n      sheetEmailTransform: sheetT('email'),\n      sheetMessageTransform: sheetT('message'),\n      sheetCreateTransform: sheetT('create'),\n      sheetContactOpacity: sheetO('contact'),\n      sheetNoteOpacity: sheetO('note'),\n      sheetTaskOpacity: sheetO('task'),\n      sheetEmailOpacity: sheetO('email'),\n      sheetMessageOpacity: sheetO('message'),\n      sheetCreateOpacity: sheetO('create'),\n      toastOpacity: s.toastShow ? 1 : 0,\n      toastTransform: s.toastShow ? 'translateY(0)' : 'translateY(20px)',\n      toastMsg: s.toastMsg,\n\n      onMenu: () => this.showToast('Job options'),\n      onNextStep: () => this.openSheet('email'),\n      onViewEstimate: () => this.showToast('Opening estimate #E-1002-1…'),\n      onViewAllFinancials: () => this.showToast('Opening all financials for this job'),\n      onCreateProposal: () => this.openSheet('create'),\n      onAddContact: () => this.openSheet('contact'),\n      onEditFields: () => this.setState({ fieldsEditing: true }),\n      onSaveFields: () => {\n        this.setState({ fieldsEditing: false });\n        this.showToast('Job details updated');\n        this.addActivity('pencil-edit-01', '#F3F4F7', '#4B5160', 'Job details updated', '8 fields edited');\n      },\n      onToggleShowAll: () => this.setState(st => ({ showAllFields: !st.showAllFields })),\n      onOpenTaskSheet: () => this.openSheet('task'),\n      onOpenCreate: () => this.openSheet('create'),\n      onQuickNote: () => this.openSheet('note'),\n      onQuickTask: () => this.openSheet('task'),\n      onQuickEmail: () => this.openSheet('email'),\n      onQuickMessage: () => this.openSheet('message'),\n      onCloseSheets: () => this.closeSheets(),\n\n      onChangeCName: (e) => this.setState({ cName: e.target.value }),\n      onChangeCPhone: (e) => this.setState({ cPhone: e.target.value }),\n      onChangeCEmail: (e) => this.setState({ cEmail: e.target.value }),\n      onChangeCPrimary: (e) => this.setState({ cPrimary: e.target.checked }),\n      onSubmitContact: () => {\n        const name = s.cName.trim();\n        if (!name) return;\n        const phone = s.cPhone.trim() || 'No phone';\n        const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();\n        const id = Date.now();\n        this.setState(st => ({\n          contacts: st.cPrimary\n            ? [...st.contacts.map(x => ({ ...x, primary: false })), { id, name, primary: true, sub: st.relSelected + ' · ' + phone, initials, avatarBg: '#EFEAFC', avatarFg: '#7C5CDB' }]\n            : [...st.contacts, { id, name, primary: false, sub: st.relSelected + ' · ' + phone, initials, avatarBg: '#EFEAFC', avatarFg: '#7C5CDB' }],\n          cName: '', cPhone: '', cEmail: '', cPrimary: false,\n          newContactId: id,\n        }));\n        setTimeout(() => this.setState(st => (st.newContactId === id ? { newContactId: null } : null)), 400);\n        this.closeSheets();\n        this.showToast(name + ' added as a contact');\n        this.addActivity('user-02', '#EFEAFC', '#7C5CDB', 'Contact added', name + ' (' + s.relSelected + ')');\n      },\n\n      onChangeNoteBody: (e) => this.setState({ noteBody: e.target.value }),\n      onSubmitNote: () => {\n        const val = s.noteBody.trim();\n        if (!val) return;\n        this.closeSheets();\n        this.showToast('Note saved');\n        this.addActivity('note-01', '#F3F4F7', '#4B5160', 'Note added', val);\n        const id = 'n' + Date.now();\n        this.setState(st => ({ notes: [{ id, body: val, time: 'Just now', editing: false, draft: '' }, ...st.notes], noteBody: '', newNoteId: id }));\n        setTimeout(() => this.setState(st => (st.newNoteId === id ? { newNoteId: null } : null)), 400);\n      },\n\n      onChangeTaskTitle: (e) => this.setState({ taskTitle: e.target.value }),\n      onChangeTaskDue: (e) => this.setState({ taskDue: e.target.value }),\n      onChangeTaskAssignee: (e) => this.setState({ taskAssignee: e.target.value }),\n      onSubmitTask: () => {\n        const title = s.taskTitle.trim();\n        if (!title) return;\n        const due = s.taskDue || 'No due date';\n        const who = s.taskAssignee || 'Unassigned';\n        const id = Date.now();\n        this.setState(st => ({\n          tasksList: [...st.tasksList, { id, title, done: false, status: 'To do', due: 'Due ' + due, who }],\n          taskTitle: '',\n          newTaskId: id,\n        }));\n        setTimeout(() => this.setState(st => (st.newTaskId === id ? { newTaskId: null } : null)), 400);\n        this.closeSheets();\n        this.showToast('Task created');\n        this.addActivity('checkmark-square-02', '#E3F8EC', '#146B3C', 'Task created', title);\n      },\n\n      onChangeEmailSubject: (e) => this.setState({ emailSubject: e.target.value }),\n      onChangeEmailBody: (e) => this.setState({ emailBody: e.target.value }),\n      onSubmitEmail: () => {\n        this.closeSheets();\n        this.showToast('Email sent to Mary Taylor');\n        this.addActivity('mail-01', '#E8F0FE', '#1E4FBE', 'Email sent — ' + s.emailSubject, 'To Mary Taylor');\n      },\n\n      onChangeMsgBody: (e) => this.setState({ msgBody: e.target.value }),\n      onSubmitMessage: () => {\n        this.closeSheets();\n        this.showToast('Text sent to Mary Taylor');\n        this.addActivity('message-01', '#EFEAFC', '#7C5CDB', 'Text message sent', 'To Mary Taylor');\n      },\n\n      onCreateProposalOpt: () => {\n        this.closeSheets();\n        this.showToast('Proposal draft created from estimate');\n        this.addActivity('file-02', '#FFECE3', '#CC4D1F', 'Proposal created', 'Draft from $18,450 estimate');\n      },\n      onCreateEstimateOpt: () => {\n        this.closeSheets();\n        this.showToast('New estimate started');\n        this.addActivity('dollar-01', '#E8F0FE', '#1E4FBE', 'Estimate created', 'New draft estimate');\n      },\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
